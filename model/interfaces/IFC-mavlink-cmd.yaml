id: IFC-mavlink-cmd
kind: interface
name: "MAVLink command execution interface"
description: >
  Execute a mission command by translating it into the appropriate MAVLink
  message sequence. The executor owns all pixel-to-GPS conversion and
  altitude-floor enforcement.
conformance_level: structural
status: draft
operations:
  - name: execute
    params:
      - {name: command, type: TYP-mission-command}
    returns: {type: None}
