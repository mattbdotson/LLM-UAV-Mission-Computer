id: NEED-explainable-decisions
kind: need
name: "Every autonomous decision is explainable after the fact"
description: >
  The mission operator must be able to review every VLM decision, understand
  what the model was thinking, and diagnose failures. This drives the reasoning
  field in the command schema, the decisions.jsonl audit log, the model-authored
  scratchpad, and the RTL fallback on parse failure.
stakeholder: "Mission operator"
status: draft
derives_from: [CON-autonomous-mission-loop]
