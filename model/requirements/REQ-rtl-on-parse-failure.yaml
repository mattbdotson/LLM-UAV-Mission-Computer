id: REQ-rtl-on-parse-failure
kind: requirement
name: "RTL on any parse or backend failure"
description: >
  On any JSON parse error, backend exception, or map composition failure the
  planner shall return an RTL command rather than propagating the exception.
  The system shall never crash or stall due to a VLM failure.
rationale: "Preserves mission safety when the autonomy layer is unreliable."
verification_method: inspection
priority: shall
status: draft
derives_from: [NEED-safe-flight]
fit_criterion: "Any exception path in Planner.decide_with_context returns {command: rtl} — verified by code inspection."
