id: REQ-altitude-floor
kind: requirement
name: "50 m altitude floor on goto_pixel and goto_waypoint"
description: >
  The executor shall enforce a minimum commanded altitude of 50 m AGL on every
  goto_pixel and goto_waypoint command, silently raising any lower value.
  The floor applies only in the executor; loiter commands carry their own
  altitude and are not subject to this floor.
rationale: "Prevents the VLM from issuing a ground-strike command by misreading altitude from the prompt."
verification_method: inspection
priority: shall
status: draft
derives_from: [NEED-safe-flight]
fit_criterion: "Executor._goto_waypoint contains `alt = max(alt, 50)`; loiter and fly_waypoints do not."
