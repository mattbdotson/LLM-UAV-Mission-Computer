id: CMP-mission-computer
kind: component
name: "Mission computer"
description: >
  The LLM-UAV mission manager package running on Penny Royal (Jetson Orin
  Nano Super 8GB). Manages the full autonomous mission lifecycle: starts
  ArduPlane SITL, connects via MAVLink, arms and launches the aircraft,
  runs the event-driven planning loop until the aircraft lands, and archives
  the mission log. V1.0 baseline — frozen as of git tag v1.0.
conformance_level: structural
status: draft
parts:
  - {name: telemetry, definition: CMP-telemetry}
  - {name: planner,   definition: CMP-planner}
  - {name: executor,  definition: CMP-executor}
