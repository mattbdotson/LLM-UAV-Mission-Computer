id: CMP-telemetry
kind: component
name: "Telemetry listener"
description: >
  Subscribes to MAVLink messages on UDP port 14552 and maintains a
  running state snapshot (position, altitude, heading, airspeed, mode).
  Also buffers raw messages for the event monitor to inspect for
  waypoint_reached, altitude_reached, and mode_changed triggers.
conformance_level: structural
status: draft
parent: CMP-mission-computer
ports:
  - {name: state_out, direction: provided, interface: IFC-telemetry}
